name: Import Data

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (UTC+10) — daily full refresh
  workflow_run:
    workflows: ["Process Data"]
    types: [completed]
  workflow_dispatch:  # manual = daily (full refresh)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      ICEBERG_REST_ENDPOINT: ${{ secrets.ICEBERG_REST_ENDPOINT }}
      ICEBERG_TOKEN: ${{ secrets.ICEBERG_TOKEN }}
      ICEBERG_WAREHOUSE: ${{ secrets.ICEBERG_WAREHOUSE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "is_daily=false" >> $GITHUB_OUTPUT
          else
            echo "is_daily=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          if [ "${{ steps.mode.outputs.is_daily }}" = "true" ]; then
            pip install duckdb dbt-duckdb
          else
            pip install duckdb
          fi

      # --- Phase 1: Intraday (always) + dims (daily only) → deploy immediately ---
      - name: Export fct_scada_today
        run: python scripts/cache_catalog.py export_scada_today

      - name: Export fct_price_today
        run: python scripts/cache_catalog.py export_price_today

      - name: Build energy_today.duckdb
        run: python scripts/cache_catalog.py build_today

      - name: Export dim_duid
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_dim_duid

      - name: Export dim_calendar
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_dim_calendar

      - name: Build energy_dim.duckdb
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_dim

      - name: Stage data for deploy
        run: |
          mkdir -p deploy_data/data
          cp dashboard/energy_today.duckdb deploy_data/data/
          cp dashboard/metadata.json deploy_data/data/
          if [ "${{ steps.mode.outputs.is_daily }}" = "true" ]; then
            cp dashboard/energy_dim.duckdb deploy_data/data/
          fi
      - name: Deploy to GitHub Pages (today + dims)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_data
          keep_files: true

      # --- Phase 2: Daily full refresh (slow) ---
      - name: Test data
        if: steps.mode.outputs.is_daily == 'true'
        run: dbt test --target prod --profiles-dir .

      - name: Export fct_scada
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_scada

      - name: Export fct_price
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_price

      - name: Build daily databases
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_daily

      - name: Build daily aggregate database
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_daily_agg

      - name: Stage data for deploy (daily)
        if: steps.mode.outputs.is_daily == 'true'
        run: |
          mkdir -p deploy_daily/data
          cp dashboard/energy_data_*.duckdb deploy_daily/data/
          cp dashboard/energy_daily_agg.duckdb deploy_daily/data/
          cp dashboard/daily_manifest.json deploy_daily/data/
      - name: Deploy to GitHub Pages (daily)
        if: steps.mode.outputs.is_daily == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_daily
          keep_files: true
